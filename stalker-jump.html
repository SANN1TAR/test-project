<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>METRO JUMP: Выход из тьмы</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #8a9a6a;
      user-select: none;
    }
    h1 {
      font-size: 1.3rem;
      color: #7a9a2a;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 2px;
      text-shadow: 0 0 10px #4a7a0a;
    }
    .subtitle { font-size: 0.65rem; color: #3a4a2a; letter-spacing: 3px; margin-bottom: 10px; }
    canvas {
      display: block;
      border: 2px solid #1a2a0a;
      image-rendering: pixelated;
      box-shadow: 0 0 28px rgba(50,100,10,0.25);
    }
    #hud {
      display: flex;
      justify-content: space-between;
      width: 360px;
      margin-top: 7px;
      font-size: 0.72rem;
      color: #4a6a2a;
      letter-spacing: 1px;
    }
    #controls {
      margin-top: 6px;
      font-size: 0.6rem;
      color: #2a3a1a;
      text-align: center;
    }
    .hl { color: #7aaa2a; }
  </style>
</head>
<body>
  <h1>☢ METRO JUMP</h1>
  <p class="subtitle">ВЫХОД ИЗ ТЬМЫ — 2033</p>
  <canvas id="c" width="360" height="600"></canvas>
  <div id="hud">
    <span>СТАДИЯ: <span id="stage-name" class="hl">МЕТРО</span></span>
    <span>ВРЕМЯ: <span id="timer" class="hl">15</span>с</span>
    <span>HP: <span id="hp" class="hl">3</span></span>
  </div>
  <div id="controls">← → / A D — движение &nbsp;|&nbsp; Z — огонь &nbsp;|&nbsp; ESC — пауза &nbsp;|&nbsp; ПРОБЕЛ — старт</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = C.width, H = C.height;

// ======== СТАДИИ ========
const STAGE_TICKS = 15 * 60; // 15 секунд при 60fps
const STAGE_CFG = [
  { name: 'МЕТРО',  bgT: '#06080a', bgB: '#0b0e08' },
  { name: 'УЛИЦА',  bgT: '#0c1008', bgB: '#171c10' },
  { name: 'КРЫШИ', bgT: '#080d18', bgB: '#0e1320' },
];

// ======== ТИПЫ ПЛАТФОРМ ========
const T = {
  SOLID:'solid', GHOST:'ghost', BREAK:'break', MOVE:'move',
  SPIKE:'spike', RAD:'rad',    METRO:'metro', ANOMALY:'anomaly'
};

// ======== СОСТОЯНИЕ ИГРЫ ========
let state = 'start'; // start|play|paused|dead|win
let camera = 0, tick = 0, gameTime = 0, currentStage = 0;
let hp = 3, bullets = 0, hasWeapon = false, weaponAmmo = 0;
let best = { time: 0, xp: 0 };

let platforms = [], enemies = [], artifacts = [],
    weapons = [], ammoPickups = [], playerBullets = [], particles = [];

let player = {};
let platFrontier = 0; // самая верхняя сгенерированная платформа

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape') {
    if (state === 'play')   { state = 'paused'; return; }
    if (state === 'paused') { state = 'play';   return; }
  }
  if (e.code === 'Space') {
    if (state === 'start' || state === 'dead' || state === 'win') { initGame(); return; }
    if (state === 'paused') { state = 'start'; return; }
  }
  if (e.code === 'KeyZ' && state === 'play') shoot();
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ======== ИНИЦИАЛИЗАЦИЯ ========
function initGame() {
  camera = 0; tick = 0; gameTime = 0; currentStage = 0;
  hp = 3; bullets = 0; hasWeapon = false; weaponAmmo = 0;
  platforms = []; enemies = []; artifacts = [];
  weapons = []; ammoPickups = []; playerBullets = []; particles = [];

  player = { x: W/2 - 8, y: H - 120, vx: 0, vy: 0, w: 16, h: 20, dir: 1, iframes: 0 };

  // Стартовая платформа
  platforms.push({ x: W/2-50, y: H-80, w:100, h:8, type:T.SOLID, vx:0, broken:false });

  // Начальный запас платформ
  platFrontier = H - 80;
  fillPlatforms();

  setHUD();
  state = 'play';
}

function setHUD() {
  document.getElementById('hp').textContent         = Math.max(0, hp);
  document.getElementById('stage-name').textContent = STAGE_CFG[currentStage]?.name ?? 'МЕТРО';
  const secsLeft = Math.ceil((STAGE_TICKS - (gameTime % STAGE_TICKS)) / 60);
  document.getElementById('timer').textContent      = secsLeft;
}

// ======== ГЕНЕРАЦИЯ ПЛАТФОРМ ========
function fillPlatforms() {
  // Генерируем пока есть место от камеры до 800px выше
  while (platFrontier > camera - 800) {
    const gap = 52 + Math.random() * 38;
    platFrontier -= gap;
    spawnPlatform(platFrontier);
  }
}

function spawnPlatform(baseY) {
  let type = T.SOLID;
  const r = Math.random();
  const stage = currentStage;

  if (stage === 0) { // МЕТРО
    if (r < 0.22)      type = T.METRO;
    else if (r < 0.32) type = T.MOVE;
    else if (r < 0.40) type = T.RAD;
    else if (r < 0.46) type = T.BREAK;
    else if (r < 0.54) type = T.GHOST;
  } else if (stage === 1) { // УЛИЦА
    if (r < 0.14)      type = T.BREAK;
    else if (r < 0.26) type = T.MOVE;
    else if (r < 0.36) type = T.SPIKE;
    else if (r < 0.44) type = T.RAD;
    else if (r < 0.54) type = T.ANOMALY;
    else if (r < 0.64) type = T.GHOST;
  } else { // КРЫШИ
    if (r < 0.18)      type = T.BREAK;
    else if (r < 0.30) type = T.MOVE;
    else if (r < 0.40) type = T.ANOMALY;
    else if (r < 0.48) type = T.SPIKE;
    else if (r < 0.56) type = T.RAD;
    else if (r < 0.62) type = T.METRO;
    else if (r < 0.72) type = T.GHOST;
  }

  const w = type === T.BREAK   ? 44 :
            type === T.METRO   ? 72 + Math.floor(Math.random()*18) :
            type === T.ANOMALY ? 28 :
            50 + Math.floor(Math.random() * 22 - 11);
  const x = Math.random() * (W - w - 8) + 4;

  platforms.push({ x, y: baseY, w, h: 8, type, vx: type===T.MOVE?(Math.random()<0.5?1.3:-1.3):0, broken: false });

  // Артефакт
  if (Math.random() < 0.07) {
    artifacts.push({ x: x + w/2 - 4, y: baseY - 18, w: 8, h: 8, collected: false });
  }
  // Оружие
  if (!hasWeapon && Math.random() < 0.10) {
    weapons.push({ x: x + w/2 - 5, y: baseY - 20, w: 10, h: 8, picked: false });
  }
  // Патроны
  if (Math.random() < 0.12) {
    ammoPickups.push({ x: x + Math.random()*(w-8), y: baseY - 14, w: 6, h: 5, picked: false });
  }
  // Враг — только на платформах выше стартовой зоны
  if (baseY < H - 300 && Math.random() < 0.08) {
    const etype = Math.random() < 0.55 ? 'zombie' : 'nosalis';
    enemies.push({ x: Math.random()*(W-16), y: baseY - 32, w:14, h:14,
                   vx:(Math.random()<0.5?1.4:-1.4)*(etype==='nosalis'?1.6:1),
                   type: etype, alive: true });
  }
}

// ======== ПРЫЖОК ========
function jump(bonus) {
  player.vy = -14 + (bonus || 0);
  for (let i = 0; i < 5; i++) particles.push({
    x: player.x + player.w/2 + (Math.random()-0.5)*8,
    y: player.y + player.h - camera, // экранные координаты
    vx: (Math.random()-0.5)*1.8, vy: Math.random()*1.5+0.4,
    life: 20, max: 20, color: '#4a4a3a', size: 2+Math.random()*2
  });
}

// ======== СТРЕЛЬБА ========
function shoot() {
  if (!hasWeapon || weaponAmmo <= 0) return;
  weaponAmmo--;
  if (weaponAmmo <= 0) hasWeapon = false;
  playerBullets.push({ x: player.x + player.w/2 - 1, y: player.y, w: 3, h: 7, vy: -16 });
  for (let i = 0; i < 4; i++) particles.push({
    x: player.x + player.w/2, y: player.y - camera, // экранные координаты
    vx: (Math.random()-0.5)*3, vy: -Math.random()*3,
    life: 10, max: 10, color: '#ffcc44', size: 2
  });
}

function takeDamage() {
  if (player.iframes > 0) return;
  hp--;
  player.iframes = 80;
  setHUD();
  if (hp <= 0) endGame('dead');
}

function endGame(result) {
  state = result;
  if (result === 'win' || result === 'dead') {
    const xp = bullets * 10;
    if (gameTime > best.time) best.time = gameTime;
    if (xp > best.xp) best.xp = xp;
  }
}

// ======== ОБНОВЛЕНИЕ ========
function update() {
  if (state !== 'play') return;
  tick++; gameTime++;

  // Смена стадии
  const newStage = Math.min(Math.floor(gameTime / STAGE_TICKS), 2);
  if (newStage !== currentStage) {
    currentStage = newStage;
    // Сброс frontier — безопасно через reduce (без stack overflow на больших массивах)
    platFrontier = platforms.reduce((m, p) => Math.min(m, p.y), platFrontier);
  }
  if (gameTime >= STAGE_TICKS * 3) { endGame('win'); return; }

  // HUD таймер (раз в секунду)
  if (tick % 60 === 0) setHUD();

  // Движение игрока
  if (keys['ArrowLeft']  || keys['KeyA']) { player.vx = -3.5; player.dir = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = 3.5;  player.dir =  1; }
  else player.vx *= 0.72;

  player.vy += 0.44;
  player.vy  = Math.min(player.vy, 16); // ограничение скорости падения
  player.x  += player.vx;
  player.y  += player.vy;

  // Обёртка по X
  if (player.x + player.w < 0)  player.x = W;
  if (player.x > W) player.x = -player.w;

  // Камера
  const target = player.y - H * 0.38;
  if (target < camera) camera = target;

  // Падение вниз = смерть
  if (player.y - camera > H + 80) { endGame('dead'); return; }

  if (player.iframes > 0) player.iframes--;

  // Генерация платформ
  fillPlatforms();

  // Удаление далёких объектов
  const cutoff = camera + H + 120;
  platforms   = platforms.filter(p => !p.broken && p.y < cutoff);
  artifacts   = artifacts.filter(a => !a.collected  && a.y < cutoff);
  weapons     = weapons.filter(w   => !w.picked     && w.y < cutoff);
  ammoPickups = ammoPickups.filter(a => !a.picked   && a.y < cutoff);
  enemies     = enemies.filter(e   => e.alive        && e.y < cutoff);

  // Платформы
  for (const p of platforms) {
    if (p.broken) continue;
    if (p.type === T.MOVE) {
      p.x += p.vx;
      if (p.x <= 0 || p.x + p.w >= W) p.vx *= -1;
    }
    if (p.type === T.RAD && tick % 6 === 0) {
      particles.push({ x: p.x+Math.random()*p.w, y: p.y-camera, vx:(Math.random()-.5)*1.3, vy:-Math.random()*1.5-.2, life:28, max:28, color:'#3aaa1a', size:1.5 });
    }
    if (p.type === T.ANOMALY && tick % 5 === 0) {
      particles.push({ x: p.x+p.w/2+(Math.random()-.5)*p.w, y: p.y-camera, vx:(Math.random()-.5)*2, vy:-Math.random()*2, life:22, max:22, color:'#ffaa00', size:1.5 });
    }

    // Коллизия (мировые координаты — player.y и p.y оба без камеры)
    if (player.vy > 0) {
      const py  = player.y + player.h;   // нижний край игрока (мир)
      const ppy = py - player.vy;         // нижний край в прошлом кадре
      if (player.x + player.w > p.x && player.x < p.x + p.w &&
          py >= p.y && ppy < p.y + 20) {  // оба в мировых координатах
        if (p.type === T.SPIKE) {
          takeDamage(); jump(-4);
        } else if (p.type === T.ANOMALY) {
          takeDamage();
          player.vy = -22; player.vx += (Math.random()-.5)*10;
          for (let i=0;i<12;i++) particles.push({ x:p.x+p.w/2, y:p.y-camera, vx:(Math.random()-.5)*5, vy:-Math.random()*4, life:22, max:22, color:'#ff8800', size:2+Math.random()*2 });
        } else if (p.type === T.RAD) {
          jump();
          if (tick % 55 === 0) takeDamage();
        } else {
          jump();
          if (p.type === T.BREAK) {
            p.broken = true;
            for (let i=0;i<8;i++) particles.push({ x:p.x+Math.random()*p.w, y:p.y-camera, vx:(Math.random()-.5)*4, vy:-Math.random()*3, life:22, max:22, color:'#5a3a10', size:2+Math.random()*3 });
          }
        }
      }
    }
  }

  // Артефакты
  for (const a of artifacts) {
    if (player.x+player.w > a.x && player.x < a.x+a.w &&
        player.y+player.h > a.y && player.y < a.y+a.h) {
      a.collected = true;
      if (hp < 5) { hp++; setHUD(); }
      for (let i=0;i<10;i++) particles.push({ x:a.x+4, y:a.y-camera, vx:(Math.random()-.5)*3, vy:-Math.random()*2-1, life:18, max:18, color:'#6aff3a', size:2 });
    }
  }

  // Оружие
  for (const w of weapons) {
    if (player.x+player.w > w.x && player.x < w.x+w.w &&
        player.y+player.h > w.y && player.y < w.y+w.h) {
      w.picked = true; hasWeapon = true; weaponAmmo = 12;
      for (let i=0;i<8;i++) particles.push({ x:w.x+5, y:w.y-camera, vx:(Math.random()-.5)*3, vy:-Math.random()*2, life:16, max:16, color:'#ccaa22', size:2 });
    }
  }

  // Патроны
  for (const a of ammoPickups) {
    if (player.x+player.w > a.x && player.x < a.x+a.w &&
        player.y+player.h > a.y && player.y < a.y+a.h) {
      a.picked = true; bullets += 5;
      if (hasWeapon) weaponAmmo = Math.min(weaponAmmo + 5, 24);
      particles.push({ x:a.x+3, y:a.y-camera, vx:0, vy:-1.5, life:16, max:16, color:'#aacc44', size:3 });
    }
  }

  // Пули игрока
  for (const b of playerBullets) {
    b.y += b.vy;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (b.x+b.w > e.x && b.x < e.x+e.w && b.y < e.y+e.h && b.y+b.h > e.y) {
        e.alive = false; b.dead = true;
        for (let i=0;i<8;i++) particles.push({ x:e.x+e.w/2, y:e.y-camera, vx:(Math.random()-.5)*4, vy:-Math.random()*3, life:18, max:18, color:'#aa2210', size:2+Math.random()*2 });
      }
    }
  }
  playerBullets = playerBullets.filter(b => !b.dead && b.y > camera - 20);

  // Враги
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.x <= 0 || e.x+e.w >= W) e.vx *= -1;

    if (player.iframes === 0 &&
        player.x+player.w > e.x && player.x < e.x+e.w &&
        player.y+player.h > e.y && player.y < e.y+e.h) {
      if (player.vy > 0 && player.y+player.h < e.y+e.h/2) {
        e.alive = false; jump(-3);
        for (let i=0;i<8;i++) particles.push({ x:e.x+e.w/2, y:e.y-camera, vx:(Math.random()-.5)*4, vy:-Math.random()*3, life:18, max:18, color:'#992200', size:2+Math.random()*2 });
      } else {
        takeDamage();
      }
    }
  }

  // Частицы
  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });
}

// ======== РИСОВАНИЕ ========
function drawBg() {
  const cfg = STAGE_CFG[currentStage];
  const gr = ctx.createLinearGradient(0,0,0,H);
  gr.addColorStop(0, cfg.bgT); gr.addColorStop(1, cfg.bgB);
  ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);

  if (currentStage === 0) {
    // МЕТРО — стены туннеля
    ctx.fillStyle = '#0e100c';
    ctx.fillRect(0, 0, 28, H);
    ctx.fillRect(W-28, 0, 28, H);
    // Кафельная плитка
    ctx.fillStyle = '#141612';
    for (let r=0; r<Math.ceil(H/18)+1; r++) {
      const ty = (r * 18 - ((-camera) % 18));
      ctx.fillRect(0, ty, 28, 1);
      ctx.fillRect(W-28, ty, 28, 1);
    }
    // Лампы
    for (let r=0; r<8; r++) {
      const ly = (r * 110 - ((-camera*0.4) % 110));
      const glow = ctx.createRadialGradient(18, ly, 0, 18, ly, 30);
      glow.addColorStop(0, 'rgba(180,200,100,0.18)');
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow; ctx.fillRect(0, ly-30, 36, 60);
      ctx.fillStyle = '#aaaa60';
      ctx.fillRect(14, ly-2, 8, 4);
      const glowR = ctx.createRadialGradient(W-18, ly, 0, W-18, ly, 30);
      glowR.addColorStop(0, 'rgba(180,200,100,0.18)');
      glowR.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glowR; ctx.fillRect(W-36, ly-30, 36, 60);
      ctx.fillStyle = '#aaaa60'; ctx.fillRect(W-22, ly-2, 8, 4);
    }
  } else if (currentStage === 1) {
    // УЛИЦА — силуэты зданий
    ctx.fillStyle = '#0c1008';
    const blds = [[0,0.55,55,0.45],[50,0.48,65,0.52],[110,0.60,40,0.40],[145,0.44,75,0.56],[215,0.54,50,0.46],[260,0.50,60,0.50],[315,0.58,45,0.42]];
    const par = ((-camera) * 0.04) % H;
    for (const [bx,by,bw,bh] of blds) {
      ctx.fillRect(bx, H*by + par%80-40, bw, H*bh+50);
      ctx.fillStyle = '#0a0e06';
      for (let wy=0;wy<5;wy++) for (let wx=0;wx<3;wx++) ctx.fillRect(bx+wx*17+5, H*by+wy*18+6+par%80-40, 6, 5);
      ctx.fillStyle = '#0c1008';
    }
    // Дым
    for (let i=0;i<4;i++) {
      const sx = (i*100 + tick*0.3) % (W+60) - 30;
      const sy = H*0.3 + Math.sin(tick*0.01+i)*40;
      const sg = ctx.createRadialGradient(sx,sy,0,sx,sy,40);
      sg.addColorStop(0,'rgba(30,35,20,0.25)'); sg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = sg; ctx.fillRect(sx-40,sy-40,80,80);
    }
  } else {
    // КРЫШИ — звёздное небо
    ctx.fillStyle = '#c0c8c0';
    for (let i=0;i<40;i++) {
      const sx = ((i*73+17)%W), sy = ((i*53+11) % (H*0.7));
      const twinkle = 0.4 + 0.3*Math.sin(tick*0.05+i);
      ctx.globalAlpha = twinkle; ctx.fillRect(sx,sy,1,1);
    }
    ctx.globalAlpha = 1;
    // Луна
    ctx.fillStyle = 'rgba(180,190,160,0.15)';
    ctx.beginPath(); ctx.arc(W-60, 60, 22, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(180,190,160,0.08)';
    ctx.beginPath(); ctx.arc(W-60, 60, 34, 0, Math.PI*2); ctx.fill();
    // Низкие силуэты крыш
    ctx.fillStyle = '#080c10';
    ctx.fillRect(0, H*0.80, W, H*0.2);
    const par2 = ((-camera)*0.06)%60;
    for (let bx=0; bx<W; bx+=50) {
      const bh = 25+((bx*7)%30);
      ctx.fillRect(bx, H*0.80-bh+par2%40, 48, bh+40);
    }
  }
}

function drawPlatforms() {
  for (const p of platforms) {
    if (p.broken) continue;
    const y = Math.round(p.y - camera);
    if (y < -16 || y > H+16) continue;
    switch (p.type) {

      case T.SOLID: {
        // Светло-серый бетон — надёжно, хорошо виден
        ctx.fillStyle='#707868'; ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#505848'; ctx.fillRect(p.x,y+p.h-2,p.w,2);
        ctx.fillStyle='#90a080'; ctx.fillRect(p.x,y,p.w,2); // яркий блик
        ctx.fillStyle='#404838';
        for (let i=0;i<Math.floor(p.w/12);i++) ctx.fillRect(p.x+i*12+5,y+2,1,4);
        break;
      }

      case T.METRO: {
        // Тёмный с ЯРКО-ЖЁЛТОЙ полосой — вагон метро
        ctx.fillStyle='#303830'; ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#e8c800'; ctx.fillRect(p.x,y+2,p.w,3); // жёлтая полоса
        ctx.fillStyle='#181e18'; ctx.fillRect(p.x,y+p.h-2,p.w,2);
        ctx.fillStyle='#151c15';
        for (let i=0;i<Math.floor(p.w/16);i++) ctx.fillRect(p.x+i*16+14,y,2,p.h);
        ctx.fillStyle='#4a5048';
        for (let i=0;i<Math.floor(p.w/10);i++) ctx.fillRect(p.x+i*10+2,y+1,2,2);
        break;
      }

      case T.BREAK: {
        // ЯРКО-ОРАНЖЕВЫЙ с трещинами и резкой вспышкой — опасно
        const flash = Math.floor(tick/5)%2===0;
        ctx.fillStyle = flash ? '#d04800' : '#a03200';
        ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#ff8844'; ctx.fillRect(p.x,y,p.w,2); // яркий верх
        ctx.fillStyle='#601800';
        // Трещины
        for (let i=0;i<4;i++) ctx.fillRect(p.x+i*(p.w/4)+2, y+2, 1, p.h-2);
        ctx.fillRect(p.x+p.w*0.3, y+3, p.w*0.4, 1);
        if (flash) { ctx.fillStyle='rgba(255,120,20,0.35)'; ctx.fillRect(p.x-1,y-1,p.w+2,p.h+2); }
        break;
      }

      case T.MOVE: {
        // СИНИЙ/ГОЛУБОЙ с чёткими стрелками — движущаяся
        ctx.fillStyle='#1e5878'; ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#2a80b0'; ctx.fillRect(p.x,y,p.w,2); // яркий верх
        ctx.fillStyle='#103040'; ctx.fillRect(p.x,y+p.h-2,p.w,2);
        // Стрелка направления
        const ax = p.x + p.w/2;
        const arrowDir = p.vx > 0 ? 1 : -1;
        ctx.fillStyle='#50c0e8';
        ctx.fillRect(ax - 8*arrowDir, y+2, 6, 4);
        ctx.beginPath();
        ctx.moveTo(ax + 2*arrowDir,  y+1);
        ctx.lineTo(ax + 8*arrowDir,  y+4);
        ctx.lineTo(ax + 2*arrowDir,  y+7);
        ctx.fill();
        break;
      }

      case T.GHOST: {
        // ПОЛУПРОЗРАЧНЫЙ — пульсирует, почти невидим
        const pulse = 0.2 + 0.2*Math.sin(tick*0.12 + p.x*0.05);
        ctx.globalAlpha = pulse + 0.15;
        ctx.fillStyle='#c8d8ff'; ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#8898cc'; ctx.fillRect(p.x,y+p.h-2,p.w,2);
        ctx.fillStyle='#eeeeff'; ctx.fillRect(p.x,y,p.w,1);
        ctx.globalAlpha = 1;
        break;
      }

      case T.SPIKE: {
        ctx.fillStyle='#301810'; ctx.fillRect(p.x,y+4,p.w,4);
        ctx.fillStyle='#cc3010';
        for (let i=0;i<Math.floor(p.w/8);i++) {
          ctx.beginPath(); ctx.moveTo(p.x+i*8+1,y+4); ctx.lineTo(p.x+i*8+4,y); ctx.lineTo(p.x+i*8+7,y+4); ctx.fill();
        }
        ctx.fillStyle='#ff5030';
        for (let i=0;i<Math.floor(p.w/8);i++) ctx.fillRect(p.x+i*8+3,y+1,2,1);
        break;
      }

      case T.RAD: {
        // ЯРКО-ЗЕЛЁНЫЙ — радиация
        const glo = 0.5+0.25*Math.sin(tick*0.12);
        ctx.fillStyle=`rgba(20,160,20,${glo})`; ctx.fillRect(p.x-3,y-3,p.w+6,p.h+6);
        ctx.fillStyle='#206820'; ctx.fillRect(p.x,y,p.w,p.h);
        ctx.fillStyle='#40cc40'; ctx.fillRect(p.x,y,p.w,2); // яркая верхушка
        ctx.fillStyle='#30aa30'; ctx.fillRect(p.x+p.w/2-1,y+2,2,p.h-2);
        ctx.fillRect(p.x+2,y+3,p.w-4,1);
        break;
      }
      case T.ANOMALY: {
        const ap = 0.45+0.35*Math.sin(tick*0.14);
        ctx.fillStyle=`rgba(160,90,0,${0.25+ap*0.25})`; ctx.fillRect(p.x-4,y-6,p.w+8,p.h+10);
        ctx.fillStyle='#3a2000'; ctx.fillRect(p.x,y+4,p.w,4);
        ctx.strokeStyle=`rgba(255,170,0,${ap})`; ctx.lineWidth=1;
        for (let i=0;i<4;i++) {
          const arc = Math.sin(tick*0.25+i*1.2)*7;
          ctx.beginPath(); ctx.moveTo(p.x+i*(p.w/4),y+4); ctx.lineTo(p.x+i*(p.w/4)+arc,y); ctx.lineTo(p.x+i*(p.w/4)+arc*0.5,y-4); ctx.stroke();
        }
        ctx.fillStyle=`rgba(255,200,0,${ap})`; ctx.font='8px monospace'; ctx.textAlign='center';
        ctx.fillText('⚡',p.x+p.w/2,y+2); ctx.textAlign='left';
        break;
      }
    }
  }
}

function drawPickups() {
  // Артефакты
  for (const a of artifacts) {
    const ay = a.y - camera;
    if (ay < -20 || ay > H+20) continue;
    const pulse = 0.35+0.2*Math.sin(tick*0.08+a.x);
    ctx.fillStyle=`rgba(90,210,50,${pulse})`; ctx.fillRect(a.x,ay,a.w,a.h);
    ctx.fillStyle='#7aff3a'; ctx.fillRect(a.x+2,ay+1,2,3); ctx.fillRect(a.x+5,ay+4,2,2);
    ctx.fillStyle=`rgba(70,190,30,${pulse*0.3})`; ctx.fillRect(a.x-3,ay-3,a.w+6,a.h+6);
  }
  // Оружие (пистолет)
  for (const w of weapons) {
    const wy = w.y - camera;
    if (wy < -20 || wy > H+20) continue;
    const bob = Math.sin(tick*0.1)*1.5;
    ctx.fillStyle='#888860'; ctx.fillRect(w.x, wy+bob, 10, 4);  // рукоять
    ctx.fillStyle='#aaa870'; ctx.fillRect(w.x+3, wy+bob-3, 7, 3); // ствол
    ctx.fillStyle='#cccc80'; ctx.fillRect(w.x+9, wy+bob-2, 2, 2); // дуло
    ctx.fillStyle='#555540'; ctx.fillRect(w.x+1, wy+bob+4, 3, 3); // приклад
    // Свечение
    ctx.fillStyle=`rgba(200,200,80,${0.2+0.1*Math.sin(tick*0.1)})`; ctx.fillRect(w.x-2,wy+bob-4,14,12);
  }
  // Патроны
  for (const a of ammoPickups) {
    const ay = a.y - camera;
    if (ay < -20 || ay > H+20) continue;
    ctx.fillStyle='#9a8a30'; ctx.fillRect(a.x, ay, a.w, a.h);
    ctx.fillStyle='#ccaa40'; ctx.fillRect(a.x+1, ay, a.w-2, 2);
    ctx.fillStyle='#7a6a20'; ctx.fillRect(a.x+1, ay+3, a.w-2, 2);
  }
}

function drawEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    const ey = e.y - camera;
    if (ey < -20 || ey > H+20) continue;
    const wb = Math.floor(tick/9)%2;
    if (e.type === 'nosalis') {
      ctx.fillStyle='#221410'; ctx.fillRect(e.x+1,ey+4,e.w-2,7);
      ctx.fillStyle='#3a0808'; ctx.fillRect(e.x+2,ey+2,6,5);
      ctx.fillStyle='#cc0808'; ctx.fillRect(e.x+3,ey+3,2,2); ctx.fillRect(e.x+4,ey+4,3,1);
      ctx.fillStyle='#2a1008';
      ctx.fillRect(e.x+wb,  ey+9,3,4); ctx.fillRect(e.x+4,  ey+9,3,4-wb);
      ctx.fillRect(e.x+8,  ey+9,3,4); ctx.fillRect(e.x+11-wb,ey+9,3,4);
      ctx.fillRect(e.x+e.w,ey+6,4,2);
    } else {
      ctx.fillStyle='#201e16'; ctx.fillRect(e.x,ey+5,e.w,e.h-5);
      ctx.fillStyle='#2e2616'; ctx.fillRect(e.x+2,ey,e.w-4,7);
      ctx.fillStyle='#cc2808'; ctx.fillRect(e.x+3,ey+2,2,2); ctx.fillRect(e.x+8,ey+2,2,2);
      ctx.fillStyle='#181610'; ctx.fillRect(e.x+3,ey+3,7,4);
      ctx.fillStyle='#380808'; ctx.fillRect(e.x+4,ey+4,2,2);
      ctx.fillStyle='#181410';
      ctx.fillRect(e.x+wb,ey+10,3,5); ctx.fillRect(e.x+8-wb,ey+10,3,5);
    }
  }
}

function drawPlayer() {
  if (player.iframes > 0 && Math.floor(tick/4)%2===0) return;
  const x = Math.round(player.x), y = Math.round(player.y - camera);
  ctx.save();
  if (player.dir < 0) { ctx.translate(x+player.w, y); ctx.scale(-1,1); } else ctx.translate(x,y);

  const d = (dx,dy,dw,dh,c) => { ctx.fillStyle=c; ctx.fillRect(dx,dy,dw,dh); };

  // Сапоги
  d(1,18,6,3,'#181410'); d(8,18,7,3,'#181410');
  d(1,20,7,1,'#0a0a08'); d(8,20,7,1,'#0a0a08');
  // Штаны
  d(2,14,5,6,'#252220'); d(9,14,5,6,'#252220');
  // Тело — стёганая куртка
  d(2,7,12,9,'#252220'); d(4,7,8,3,'#322e28');
  // Наплечники
  d(0,7,3,4,'#302e28'); d(13,7,3,4,'#302e28');
  // Патронташ/ремень
  d(2,10,12,1,'#3a3018'); d(7,7,1,9,'#3a3018');
  // Трубки к фильтру
  d(5,10,2,4,'#181816'); d(9,10,2,4,'#181816');
  // Голова
  d(3,1,10,8,'#252220');
  // Противогаз (Metro-стиль)
  d(4,2,8,7,'#1c1c18'); d(3,4,10,4,'#1c1c18');
  // Стёкла
  d(4,3,4,3,'#0a2a28'); d(8,3,4,3,'#0a2a28');
  d(5,3,1,1,'#1a6060'); d(9,3,1,1,'#1a6060');
  // Фильтры
  d(5,7,3,3,'#302e28'); d(8,7,3,3,'#302e28');
  d(6,9,1,2,'#202018'); d(9,9,1,2,'#202018');
  // Если есть оружие — рисуем пистолет сбоку
  if (hasWeapon) {
    d(14,10,7,3,'#7a7850');
    d(16,8,5,3,'#9a9860');
    d(20,9,2,2,'#aaa870');
  }
  ctx.restore();
}

function drawPlayerBullets() {
  ctx.fillStyle = '#ffdd44';
  for (const b of playerBullets) {
    ctx.fillRect(Math.round(b.x), Math.round(b.y - camera), b.w, b.h);
    ctx.fillStyle = 'rgba(255,200,50,0.4)';
    ctx.fillRect(Math.round(b.x)-1, Math.round(b.y - camera)-2, b.w+2, b.h+4);
    ctx.fillStyle = '#ffdd44';
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.max;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x-p.size/2), Math.round(p.y-p.size/2), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawCRT() {
  // Сканлайны
  ctx.fillStyle = 'rgba(0,0,0,0.055)';
  for (let i=0; i<H; i+=3) ctx.fillRect(0,i,W,1);
  // Виньетка
  const v = ctx.createRadialGradient(W/2,H/2,H*0.28,W/2,H/2,H*0.85);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);
}

function drawStageHUD() {
  const overallProgress = gameTime / (STAGE_TICKS * 3);
  // Нижняя полоска
  ctx.fillStyle = '#1a1a10';
  ctx.fillRect(0, H-4, W, 4);
  ctx.fillStyle = currentStage===0 ? '#3a8a1a' : currentStage===1 ? '#6a7a1a' : '#1a4a6a';
  ctx.fillRect(0, H-4, W * overallProgress, 4);
  // Разделители стадий
  ctx.fillStyle = '#2a2a18';
  ctx.fillRect(W/3-1, H-4, 2, 4);
  ctx.fillRect(W*2/3-1, H-4, 2, 4);

  // Если есть оружие — индикатор
  if (hasWeapon) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(W-44, 8, 38, 12);
    ctx.fillStyle = '#ccaa30';
    ctx.font = '8px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText(`ПИСТОЛЕТ`, W-8, 18);
    ctx.textAlign = 'left';
  }
}

// ======== ЭКРАНЫ ========
function drawStartScreen() {
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#7a9a2a'; ctx.font='bold 20px Courier New';
  ctx.fillText('☢  METRO JUMP  ☢', W/2, H/2-80);
  ctx.fillStyle='#4a5a20'; ctx.font='10px Courier New';
  ctx.fillText('ВЫХОД ИЗ ТЬМЫ — 2033', W/2, H/2-60);

  ctx.fillStyle='#3a5a18'; ctx.font='11px Courier New';
  ctx.fillText('3 СТАДИИ · 15 СЕКУНД КАЖДАЯ', W/2, H/2-38);
  ctx.fillStyle='#556a28'; ctx.font='10px Courier New';
  ctx.fillText('МЕТРО  →  УЛИЦА  →  КРЫШИ', W/2, H/2-20);

  ctx.fillStyle='#7aaa2a'; ctx.font='bold 13px Courier New';
  ctx.fillText('[ ПРОБЕЛ ] — начать', W/2, H/2+10);

  ctx.fillStyle='#3a4a18'; ctx.font='9px Courier New';
  ctx.fillText('← → / A D — движение  |  Z — огонь', W/2, H/2+32);
  ctx.fillText('ESC — пауза', W/2, H/2+46);

  const leg = [
    ['#707868','Бетон — надёжно (серый)'],
    ['#303830','Вагон метро — жёлтая полоса'],
    ['#c04000','Обломок ⚠ — обламывается (оранжевый)'],
    ['#1e5878','Труба — движется (синий + стрелка)'],
    ['#c8d8ff','Призрак — полупрозрачный, держит'],
    ['#206820','Радиация ☢ — зелёный, урон'],
    ['#3a2000','Аномалия ⚡ — оранжевый, отброс'],
    ['#cc3010','Шипы — красные, урон'],
    ['#4aaa20','Артефакт ◆ — +1 HP'],
    ['#888860','Пистолет — 12 выстрелов (Z)'],
  ];
  leg.forEach(([c,t],i) => {
    ctx.fillStyle=c; ctx.fillRect(W/2-95, H/2+62+i*16, 10, 7);
    ctx.fillStyle='#4a5a28'; ctx.font='9px Courier New'; ctx.textAlign='left';
    ctx.fillText(t, W/2-80, H/2+69+i*16);
  });
  ctx.textAlign='left';
}

function drawPauseScreen() {
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#7a9a2a'; ctx.font='bold 18px Courier New';
  ctx.fillText('— ПАУЗА —', W/2, H/2-20);
  ctx.fillStyle='#4a6a20'; ctx.font='12px Courier New';
  ctx.fillText('ESC — продолжить игру', W/2, H/2+10);
  ctx.fillText('ПРОБЕЛ — выйти в меню', W/2, H/2+28);
  ctx.textAlign='left';
}

function drawDeadScreen() {
  ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#8a1808'; ctx.font='bold 20px Courier New';
  ctx.fillText('☠  ВЫЖИВШИЙ ПОГИБ  ☠', W/2, H/2-55);
  const xp = bullets * 10;
  ctx.fillStyle='#6a8a20'; ctx.font='12px Courier New';
  ctx.fillText(`Стадия: ${STAGE_CFG[currentStage]?.name ?? '?'}`, W/2, H/2-25);
  ctx.fillText(`Время: ${Math.floor(gameTime/60)}с из 45с`, W/2, H/2-5);
  ctx.fillStyle='#aacc40'; ctx.font='bold 13px Courier New';
  ctx.fillText(`ОПЫТ (XP): ${xp}`, W/2, H/2+20);
  ctx.fillStyle='#4a6a18'; ctx.font='10px Courier New';
  ctx.fillText(`(${bullets} патронов × 10)`, W/2, H/2+36);
  ctx.fillStyle='#7aaa2a'; ctx.font='bold 12px Courier New';
  ctx.fillText('[ ПРОБЕЛ ] — снова', W/2, H/2+60);
  ctx.textAlign='left';
}

function drawWinScreen() {
  ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  // Пульсирующий заголовок
  const p = 0.7+0.3*Math.sin(tick*0.06);
  ctx.fillStyle=`rgba(120,200,40,${p})`; ctx.font='bold 20px Courier New';
  ctx.fillText('★ ТЫ ВЫЖИЛ! ★', W/2, H/2-65);
  ctx.fillStyle='#5a8a20'; ctx.font='11px Courier New';
  ctx.fillText('Все 3 стадии пройдены', W/2, H/2-42);
  const xp = bullets * 10;
  ctx.fillStyle='#aadd40'; ctx.font='bold 15px Courier New';
  ctx.fillText(`ИТОГОВЫЙ XP: ${xp}`, W/2, H/2-10);
  ctx.fillStyle='#4a6a18'; ctx.font='10px Courier New';
  ctx.fillText(`(${bullets} патронов × 10)`, W/2, H/2+8);
  ctx.fillStyle='#7aaa2a'; ctx.font='bold 12px Courier New';
  ctx.fillText('[ ПРОБЕЛ ] — сыграть снова', W/2, H/2+40);
  ctx.textAlign='left';
}

// ======== ГЛАВНЫЙ ЦИКЛ ========
function loop() {
  update();
  drawBg();
  if (state === 'play' || state === 'paused') {
    drawPlatforms();
    drawPickups();
    drawEnemies();
    drawPlayer();
    drawPlayerBullets();
    drawParticles();
    drawCRT();
    drawStageHUD();
    if (state === 'paused') drawPauseScreen();
  }
  if (state === 'start') drawStartScreen();
  if (state === 'dead')  drawDeadScreen();
  if (state === 'win')   drawWinScreen();
  requestAnimationFrame(loop);
}

loop();
</script>
